<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar League System</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --purple-highlight: #8e44ad;
            --orange-highlight: #d35400;
            --btn-primary: #3498db;
            --btn-hover: #2980b9;
            --btn-correct: #27ae60;
            --btn-correct-hover: #2ecc71;
            --btn-wrong: #e74c3c;
            --btn-wrong-hover: #c0392b;
            --btn-advance: #f39c12;
            --btn-advance-hover: #e67e22;
            --deck-active: #2c3e50;
            --deck-inactive: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header {
            margin-bottom: 1.5rem;
            text-align: center;
            width: 90%;
            max-width: 650px;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2.2rem;
            color: #2c3e50;
        }

        .deck-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .btn-deck {
            background-color: var(--deck-inactive);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-deck.active {
            background-color: var(--deck-active);
        }

        .progress {
            font-size: 1.1rem;
            font-weight: 600;
            color: #7f8c8d;
        }

        .keyboard-hints {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #95a5a6;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .keyboard-hints span {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #34495e;
        }

        .app-container {
            width: 90%;
            max-width: 650px;
        }

        .flashcard {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 250px;
            border: 3px solid #e74c3c; 
        }

        .level-badge {
            align-self: flex-start;
            background-color: #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #34495e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .turkish-text, .english-text {
            font-size: 1.4rem;
            line-height: 1.5;
            font-weight: 500;
            min-height: 60px;
        }

        .text-purple {
            color: var(--purple-highlight);
            font-weight: 700;
        }

        .text-orange {
            color: var(--orange-highlight);
            font-weight: 700;
        }

        .divider-line {
            display: none;
            height: 2px;
            background-color: #e74c3c;
            width: 100%;
            border: none;
            margin: 0.5rem 0;
        }

        .english-text {
            display: none;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-show { background-color: var(--btn-primary); }
        .btn-show:hover { background-color: var(--btn-hover); }

        .assessment-btns {
            display: none;
            width: 100%;
            gap: 1rem;
        }

        .btn-correct { background-color: var(--btn-correct); }
        .btn-correct:hover { background-color: var(--btn-correct-hover); }
        
        .btn-wrong { background-color: var(--btn-wrong); }
        .btn-wrong:hover { background-color: var(--btn-wrong-hover); }

        .summary-screen {
            display: none;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 3rem 2rem;
            text-align: center;
            border: 3px solid var(--btn-primary);
        }

        .summary-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
        }

        .stat-box {
            background-color: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            min-width: 100px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .stat-green { color: var(--btn-correct); }
        .stat-red { color: var(--btn-wrong); }
        .stat-blue { color: var(--btn-primary); }

        .summary-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-review { background-color: var(--btn-wrong); }
        .btn-review:hover { background-color: var(--btn-wrong-hover); }

        .btn-advance { background-color: var(--btn-advance); }
        .btn-advance:hover { background-color: var(--btn-advance-hover); }

    </style>
</head>
<body>

        <h1>Grammar League</h1>

            <button class="btn-deck" id="btn-deck2" onclick="switchDeck('deck2')">Deck 2</button>
        </div>
