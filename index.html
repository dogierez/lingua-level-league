<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar League System</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --purple-highlight: #8e44ad;
            --orange-highlight: #d35400;
            --btn-primary: #3498db;
            --btn-hover: #2980b9;
            --btn-correct: #27ae60;
            --btn-correct-hover: #2ecc71;
            --btn-wrong: #e74c3c;
            --btn-wrong-hover: #c0392b;
            --btn-advance: #f39c12;
            --btn-advance-hover: #e67e22;
            --deck-active: #2c3e50;
            --deck-inactive: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header {
            margin-bottom: 1.5rem;
            text-align: center;
            width: 90%;
            max-width: 650px;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2.2rem;
            color: #2c3e50;
        }

        .deck-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .btn-deck {
            background-color: var(--deck-inactive);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-deck.active {
            background-color: var(--deck-active);
        }

        .progress {
            font-size: 1.1rem;
            font-weight: 600;
            color: #7f8c8d;
        }

        .keyboard-hints {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #95a5a6;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .keyboard-hints span {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #34495e;
        }

        .app-container {
            width: 90%;
            max-width: 650px;
        }

        .flashcard {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 250px;
            border: 3px solid #e74c3c; 
        }

        .level-badge {
            align-self: flex-start;
            background-color: #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #34495e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .turkish-text, .english-text {
            font-size: 1.4rem;
            line-height: 1.5;
            font-weight: 500;
            min-height: 60px;
        }

        .text-purple {
            color: var(--purple-highlight);
            font-weight: 700;
        }

        .text-orange {
            color: var(--orange-highlight);
            font-weight: 700;
        }

        .divider-line {
            display: none;
            height: 2px;
            background-color: #e74c3c;
            width: 100%;
            border: none;
            margin: 0.5rem 0;
        }

        .english-text {
            display: none;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-show { background-color: var(--btn-primary); }
        .btn-show:hover { background-color: var(--btn-hover); }

        .assessment-btns {
            display: none;
            width: 100%;
            gap: 1rem;
        }

        .btn-correct { background-color: var(--btn-correct); }
        .btn-correct:hover { background-color: var(--btn-correct-hover); }
        
        .btn-wrong { background-color: var(--btn-wrong); }
        .btn-wrong:hover { background-color: var(--btn-wrong-hover); }

        .summary-screen {
            display: none;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 3rem 2rem;
            text-align: center;
            border: 3px solid var(--btn-primary);
        }

        .summary-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
        }

        .stat-box {
            background-color: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            min-width: 100px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .stat-green { color: var(--btn-correct); }
        .stat-red { color: var(--btn-wrong); }
        .stat-blue { color: var(--btn-primary); }

        .summary-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-review { background-color: var(--btn-wrong); }
        .btn-review:hover { background-color: var(--btn-wrong-hover); }

        .btn-advance { background-color: var(--btn-advance); }
        .btn-advance:hover { background-color: var(--btn-advance-hover); }

    </style>
</head>
<body>

    <div class="header">
        <h1>Grammar League</h1>
        
        <!-- DECK SELECTOR -->
        <div class="deck-selector">
            <button class="btn-deck active" id="btn-deck1" onclick="switchDeck('deck1')">Deck 1</button>
            <button class="btn-deck" id="btn-deck2" onclick="switchDeck('deck2')">Deck 2</button>
        </div>

        <div class="progress" id="progress-text">Initializing...</div>
        <div class="keyboard-hints">
            <div><span>↑</span> Show English</div>
            <div><span>←</span> Incorrect</div>
            <div><span>→</span> Correct</div>
            <div><span>↓</span> Undo</div>
        </div>
    </div>

    <div class="app-container">
        <!-- FLASHCARD UI -->
        <div class="flashcard" id="flashcard-screen">
            <div class="level-badge" id="level-badge">League 1</div>
            
            <div class="turkish-text" id="turkish-text"></div>
            <hr class="divider-line" id="divider-line">
            <div class="english-text" id="english-text"></div>

            <div class="controls" id="btn-show-container">
                <button class="btn-show" onclick="showEnglish()">Show English <span>(↑)</span></button>
            </div>

            <div class="controls assessment-btns" id="assessment-btns">
                <button class="btn-wrong" onclick="recordAnswer(false)"><span>(←)</span> ❌ Incorrect</button>
                <button class="btn-correct" onclick="recordAnswer(true)">✅ Correct <span>(→)</span></button>
            </div>
        </div>

        <!-- SUMMARY UI -->
        <div class="summary-screen" id="summary-screen">
            <div class="summary-title" id="summary-title">League Complete!</div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number stat-green" id="stat-correct">0</div>
                    <div>Correct</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number stat-red" id="stat-wrong">0</div>
                    <div>Incorrect</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number stat-blue" id="stat-percent">0%</div>
                    <div>Accuracy</div>
                </div>
            </div>

            <div class="summary-controls" id="summary-controls">
                <!-- Buttons dynamically injected here -->
            </div>
        </div>
    </div>

                {
                    level1: { tr: "Öğretmen kağıtları dağıtıyordu.", en: "The teacher was distributing the papers." },
                    level2: { tr: "Öğretmen kağıtları <span class='text-purple'>zil çaldığında</span> dağıtıyordu.", en: "The teacher was distributing the papers <span class='text-purple'>when the bell rang</span>." },
                    level3: { tr: "Öğretmen kağıtları <span class='text-orange'>bitişi işaret eden</span> <span class='text-purple'>zil çaldığında</span> dağıtıyordu.", en: "The teacher was distributing the papers <span class='text-purple'>when the bell </span><span class='text-orange'>signaling the end</span><span class='text-purple'> rang</span>." }
                },
                {
                    level1: { tr: "Geliştirici uygulamayı güncelleyemedi.", en: "The developer couldn't update the app." },
                    level2: { tr: "Geliştirici uygulamayı <span class='text-purple'>kullanıcılar şikayet edene kadar</span> güncelleyemedi.", en: "The developer couldn't update the app <span class='text-purple'>until the users complained</span>." },
                    level3: { tr: "<span class='text-orange'>Bütün gece kod yazan</span> geliştirici uygulamayı <span class='text-purple'>kullanıcılar şikayet edene kadar</span> güncelleyemedi.", en: "The developer <span class='text-orange'>coding all night</span> couldn't update the app <span class='text-purple'>until the users complained</span>." }
                }
            ]
        };

        // State Management
        let currentDeckData = decks.deck1;
        let currentLeague = 1;
        let activeQueue = []; 
        let wrongQueue = [];  
        let currentIndex = 0; 
        
        // Stats
        let correctCount = 0;
        let wrongCount = 0;
        let isEnglishVisible = false;

        // DOM Elements
        const uiFlashcard = document.getElementById('flashcard-screen');
        const uiSummary = document.getElementById('summary-screen');
        const elTurkish = document.getElementById('turkish-text');
        const elEnglish = document.getElementById('english-text');
        const elDivider = document.getElementById('divider-line');
        const containerShowBtn = document.getElementById('btn-show-container');
        const containerAssessBtns = document.getElementById('assessment-btns');
        const elProgress = document.getElementById('progress-text');
        const elBadge = document.getElementById('level-badge');
        const btnDeck1 = document.getElementById('btn-deck1');
        const btnDeck2 = document.getElementById('btn-deck2');

        function initApp() {
            switchDeck('deck1');
            setupKeyboardShortcuts();
        }

        // Shuffle Function to randomize arrays
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function switchDeck(deckName) {
            // Update UI buttons
            if (deckName === 'deck1') {
                btnDeck1.classList.add('active');
                btnDeck2.classList.remove('active');
            } else {
                btnDeck2.classList.add('active');
                btnDeck1.classList.remove('active');
            }

            // Set data and restart
            currentDeckData = decks[deckName];
            startLeague(1);
        }

        function startLeague(leagueNum) {
            currentLeague = leagueNum;
            // Populate queue and shuffle for random order
            activeQueue = currentDeckData.map((_, index) => index);
            shuffleArray(activeQueue);
            
            resetStatsAndRender();
        }

        function startReview() {
            activeQueue = [...wrongQueue];
            shuffleArray(activeQueue);
            resetStatsAndRender();
        }

        function resetStatsAndRender() {
            wrongQueue = [];
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            
            uiSummary.style.display = 'none';
            uiFlashcard.style.display = 'flex';
            
            renderCard();
        }

        function renderCard() {
            isEnglishVisible = false;
            
            const sentenceId = activeQueue[currentIndex];
            const data = currentDeckData[sentenceId][`level${currentLeague}`];
            
            elBadge.innerText = `League ${currentLeague}`;
            elProgress.innerText = `Card ${currentIndex + 1} of ${activeQueue.length}`;
            
            elTurkish.innerHTML = data.tr;
            elEnglish.innerHTML = data.en;
            
            elEnglish.style.display = 'none';
            elDivider.style.display = 'none';
            containerShowBtn.style.display = 'flex';
            containerAssessBtns.style.display = 'none';
        }

        function showEnglish() {
            isEnglishVisible = true;
            elEnglish.style.display = 'block';
            elDivider.style.display = 'block';
            containerShowBtn.style.display = 'none';
            containerAssessBtns.style.display = 'flex';
        }

        function recordAnswer(isCorrect) {
            if (isCorrect) {
                correctCount++;
            } else {
                wrongCount++;
                wrongQueue.push(activeQueue[currentIndex]); 
            }
            
            currentIndex++;
            
            if (currentIndex >= activeQueue.length) {
                renderSummary();
            } else {
                renderCard();
            }
        }

        // --- NEW UNDO FUNCTIONALITY ---
        function undoAction() {
            // Cannot undo if we are on the first card and haven't answered it yet
            if (currentIndex === 0 && uiSummary.style.display === 'none') return;

            // If we are on the summary screen, we want to step back to the last card
            if (uiSummary.style.display !== 'none') {
                uiSummary.style.display = 'none';
                uiFlashcard.style.display = 'flex';
            }

            // Step back one card
            currentIndex--;
            const undoneSentenceId = activeQueue[currentIndex];

            // Revert the stats based on what the user previously entered
            if (wrongQueue.length > 0 && wrongQueue[wrongQueue.length - 1] === undoneSentenceId) {
                wrongQueue.pop(); // Remove it from the wrong queue
                wrongCount--;
            } else {
                correctCount--;
            }

            // Render the previous card fresh
            renderCard();
        }

        function renderSummary() {
            uiFlashcard.style.display = 'none';
            uiSummary.style.display = 'block';
            
            document.getElementById('summary-title').innerText = `League ${currentLeague} Complete!`;
            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-wrong').innerText = wrongCount;
            
            const total = correctCount + wrongCount;
            const percent = Math.round((correctCount / total) * 100);
            document.getElementById('stat-percent').innerText = `${percent}%`;

            const controlsDiv = document.getElementById('summary-controls');
            controlsDiv.innerHTML = ''; 

            if (wrongCount > 0) {
                const btnReview = document.createElement('button');
                btnReview.className = 'btn-review';
                btnReview.innerText = `Review ${wrongCount} Mistakes`;
                btnReview.onclick = startReview;
                controlsDiv.appendChild(btnReview);
            }

            if (currentLeague < 3) {
                const btnAdvance = document.createElement('button');
                btnAdvance.className = 'btn-advance';
                btnAdvance.innerText = `Advance to League ${currentLeague + 1}`;
                btnAdvance.onclick = () => startLeague(currentLeague + 1);
                controlsDiv.appendChild(btnAdvance);
            } else if (currentLeague === 3 && wrongCount === 0) {
                const btnFinish = document.createElement('button');
                btnFinish.className = 'btn-advance';
                btnFinish.innerText = `🏆 Mastered Everything! Restart League 1`;
                btnFinish.onclick = () => startLeague(1);
                controlsDiv.appendChild(btnFinish);
            }
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', function(event) {
                // Flashcard Screen Keybinds
                if (uiFlashcard.style.display !== 'none') {
                    if (event.key === 'ArrowUp' && !isEnglishVisible) {
                        event.preventDefault(); 
                        showEnglish();
                    } else if (event.key === 'ArrowRight' && isEnglishVisible) {
                        event.preventDefault();
                        recordAnswer(true);
                    } else if (event.key === 'ArrowLeft' && isEnglishVisible) {
                        event.preventDefault();
                        recordAnswer(false);
                    } else if (event.key === 'ArrowDown') {
                        event.preventDefault();
                        undoAction(); // The new undo assignment
                    }
                } 
                // Summary Screen Keybinds
                else if (uiSummary.style.display !== 'none') {
                    if (event.key === 'ArrowDown') {
                        event.preventDefault();
                        undoAction(); // Let them undo even from the summary screen!
                    }
                }
            });
        }

        window.onload = initApp;

    </script>
</body>
</html>
