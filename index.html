<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar League System</title>
    
    <!-- PWA Additions -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --purple-highlight: #8e44ad;
            --orange-highlight: #d35400;
            --btn-primary: #3498db;
            --btn-hover: #2980b9;
            --btn-correct: #27ae60;
            --btn-correct-hover: #2ecc71;
            --btn-wrong: #e74c3c;
            --btn-wrong-hover: #c0392b;
            --btn-advance: #f39c12;
            --btn-advance-hover: #e67e22;
            --deck-active: #2c3e50;
            --deck-inactive: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        .header {
            margin-bottom: 1.5rem;
            text-align: center;
            width: 90%;
            max-width: 650px;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2.2rem;
            color: #2c3e50;
        }

        .deck-selector {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .btn-deck {
            background-color: var(--deck-inactive);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-deck.active {
            background-color: var(--deck-active);
        }

        .progress {
            font-size: 1.1rem;
            font-weight: 600;
            color: #7f8c8d;
        }

        .keyboard-hints {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #95a5a6;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .keyboard-hints span {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #34495e;
        }

        .app-container {
            width: 90%;
            max-width: 650px;
        }

        .flashcard {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 250px;
            border: 3px solid #e74c3c; 
        }

        .level-badge {
            align-self: flex-start;
            background-color: #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #34495e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .turkish-text, .english-text {
            font-size: 1.4rem;
            line-height: 1.6;
            font-weight: 500;
            min-height: 60px;
        }

        .text-purple {
            color: var(--purple-highlight);
            font-weight: 700;
        }

        .text-orange {
            color: var(--orange-highlight);
            font-weight: 700;
        }

        /* Dictionary Word Styling */
        .dict-word {
            cursor: pointer;
            border-bottom: 2px dotted var(--btn-primary);
            transition: background-color 0.2s;
            border-radius: 2px;
        }

        .dict-word:hover {
            background-color: #e3f2fd;
        }

        .divider-line {
            display: none;
            height: 2px;
            background-color: #e74c3c;
            width: 100%;
            border: none;
            margin: 0.5rem 0;
        }

        .english-text {
            display: none;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-show { background-color: var(--btn-primary); }
        .btn-show:hover { background-color: var(--btn-hover); }

        .assessment-btns {
            display: none;
            width: 100%;
            gap: 1rem;
        }

        .btn-correct { background-color: var(--btn-correct); }
        .btn-correct:hover { background-color: var(--btn-correct-hover); }
        
        .btn-wrong { background-color: var(--btn-wrong); }
        .btn-wrong:hover { background-color: var(--btn-wrong-hover); }

        .summary-screen {
            display: none;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 3rem 2rem;
            text-align: center;
            border: 3px solid var(--btn-primary);
        }

        .summary-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
        }

        .stat-box {
            background-color: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            min-width: 100px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .stat-green { color: var(--btn-correct); }
        .stat-red { color: var(--btn-wrong); }
        .stat-blue { color: var(--btn-primary); }

        .summary-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-review { background-color: var(--btn-wrong); }
        .btn-review:hover { background-color: var(--btn-wrong-hover); }
        .btn-advance { background-color: var(--btn-advance); }
        .btn-advance:hover { background-color: var(--btn-advance-hover); }

        /* Floating Tooltip styling */
        .tooltip-dict {
            position: absolute;
            display: none;
            background-color: #2c3e50;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transform: translateX(-50%);
        }

        .tooltip-dict::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: #2c3e50 transparent transparent transparent;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Grammar League</h1>
        
        <div class="deck-selector">
            <button class="btn-deck active" id="btn-deck1" onclick="switchDeck('deck1')">Deck 1</button>
            <button class="btn-deck" id="btn-deck2" onclick="switchDeck('deck2')">Deck 2</button>
            <button class="btn-deck" id="btn-deck3" onclick="switchDeck('deck3')">Deck 3</button>
            <button class="btn-deck" id="btn-deck4" onclick="switchDeck('deck4')">Deck 4</button>
        </div>

        <div class="progress" id="progress-text">Initializing...</div>
        <div class="keyboard-hints">
            <div><span>↑</span> Show English</div>
            <div><span>←</span> Incorrect</div>
            <div><span>→</span> Correct</div>
            <div><span>↓</span> Undo</div>
        </div>
    </div>

    <div class="app-container">
        <!-- FLASHCARD UI -->
        <div class="flashcard" id="flashcard-screen">
            <div class="level-badge" id="level-badge">League 1</div>
            
            <div class="turkish-text" id="turkish-text"></div>
            <hr class="divider-line" id="divider-line">
            <div class="english-text" id="english-text"></div>

            <div class="controls" id="btn-show-container">
                <button class="btn-show" onclick="showEnglish()">Show English <span>(↑)</span></button>
            </div>

            <div class="controls assessment-btns" id="assessment-btns">
                <button class="btn-wrong" onclick="recordAnswer(false)"><span>(←)</span> ❌ Incorrect</button>
                <button class="btn-correct" onclick="recordAnswer(true)">✅ Correct <span>(→)</span></button>
            </div>
        </div>

        <!-- SUMMARY UI -->
        <div class="summary-screen" id="summary-screen">
            <div class="summary-title" id="summary-title">League Complete!</div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number stat-green" id="stat-correct">0</div>
                    <div>Correct</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number stat-red" id="stat-wrong">0</div>
                    <div>Incorrect</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number stat-blue" id="stat-percent">0%</div>
                    <div>Accuracy</div>
                </div>
            </div>

            <div class="summary-controls" id="summary-controls"></div>
        </div>
    </div>

    <div id="tooltip-dict" class="tooltip-dict"></div>

                    level3: { tr: "<span class='text-orange'>Antika satan</span> tezgahtar <span class='text-purple'>sokaklar karardığında</span> dükkanı kapatırdı.", en: "The shopkeeper <span class='text-orange'>selling antiques</span> used to close the store <span class='text-purple'>when the streets got dark</span>." }
                },
                {
                    vocab: { "ev": "host", "sahibi": "host", "akşam": "dinner", "yemeğini": "dinner", "pişirmek": "cook", "misafirler": "guests", "pizza": "pizza", "sipariş": "ordered", "ettiğinden": "ordered", "masayı": "table", "kuran": "setting" },

                },
                {
                    vocab: { "çift": "couple", "duvarları": "walls", "boyuyordu": "painting", "boya": "paint", "bitene": "finished", "kadar": "until", "yeni": "new", "evlerine": "house", "taşınan": "moving" },
                    level1: { tr: "Çift duvarları boyuyordu.", en: "The couple was painting the walls." },
                    level2: { tr: "Çift <span class='text-purple'>boya bitene kadar</span> duvarları boyuyordu.", en: "The couple was painting the walls <span class='text-purple'>until the paint finished</span>." },
                    level3: { tr: "<span class='text-orange'>Yeni evlerine taşınan</span> çift <span class='text-purple'>boya bitene kadar</span> duvarları boyuyordu.", en: "The couple <span class='text-orange'>moving into their new house</span> was painting the walls <span class='text-purple'>until the paint finished</span>." }
                },
                {
                    vocab: { "takım": "team", "ürünü": "product", "piyasaya": "launch", "süremedi": "launch", "pazarlama": "marketing", "bütçesi": "budget", "düşük": "low", "geçen": "last", "yıl": "year", "geliştirilen": "developed" },
                    level1: { tr: "Takım ürünü piyasaya süremedi.", en: "The team couldn't launch the product." },
                    level2: { tr: "Takım <span class='text-purple'>pazarlama bütçesi düşük olduğundan dolayı</span> ürünü piyasaya süremedi.", en: "The team couldn't launch the product <span class='text-purple'>because the marketing budget was low</span>." },
                    level3: { tr: "Takım <span class='text-purple'>pazarlama bütçesi düşük olduğundan dolayı</span> <span class='text-orange'>geçen yıl geliştirilen</span> ürünü piyasaya süremedi.", en: "The team couldn't launch the product <span class='text-orange'>developed last year</span> <span class='text-purple'>because the marketing budget was low</span>." }
                }
            ]
        };

        let currentDeckData = decks.deck1;
        let currentLeague = 1;
        let activeQueue = []; 
        let wrongQueue = [];  
        let currentIndex = 0; 
        
        let correctCount = 0;
        let wrongCount = 0;
        let isEnglishVisible = false;

        const uiFlashcard = document.getElementById('flashcard-screen');
        const uiSummary = document.getElementById('summary-screen');
        const elTurkish = document.getElementById('turkish-text');
        const elEnglish = document.getElementById('english-text');
        const elDivider = document.getElementById('divider-line');
        const containerShowBtn = document.getElementById('btn-show-container');
        const containerAssessBtns = document.getElementById('assessment-btns');
        const elProgress = document.getElementById('progress-text');
        const elBadge = document.getElementById('level-badge');
        const tooltip = document.getElementById('tooltip-dict');

        function initApp() {
            switchDeck('deck1');
            setupKeyboardShortcuts();
            setupTooltip();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function switchDeck(deckName) {
            document.querySelectorAll('.btn-deck').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${deckName}`).classList.add('active');

            currentDeckData = decks[deckName];
            startLeague(1);
        }

        function startLeague(leagueNum) {
            currentLeague = leagueNum;
            activeQueue = currentDeckData.map((_, index) => index);
            shuffleArray(activeQueue);
            resetStatsAndRender();
        }

        function startReview() {
            activeQueue = [...wrongQueue];
            shuffleArray(activeQueue);
            resetStatsAndRender();
        }

        function resetStatsAndRender() {
            wrongQueue = [];
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            
            uiSummary.style.display = 'none';
            uiFlashcard.style.display = 'flex';
            tooltip.style.display = 'none';
            
            renderCard();
        }

        // Contextual Wrapping Function
        function wrapWords(htmlString) {
            const temp = document.createElement('div');
            temp.innerHTML = htmlString;
            
            function process(node) {
                if (node.nodeType === 3) {
                    const regex = /([a-zA-ZğüşıöçĞÜŞİÖÇ]+)/g;
                    const wrapped = node.nodeValue.replace(regex, "<span class='dict-word'>$1</span>");
                    const spanWrapper = document.createElement('span');
                    spanWrapper.innerHTML = wrapped;
                    
                    while (spanWrapper.firstChild) {
                        node.parentNode.insertBefore(spanWrapper.firstChild, node);
                    }
                    node.parentNode.removeChild(node);
                } else if (node.nodeType === 1 && node.nodeName !== 'SPAN' || (node.nodeName === 'SPAN' && !node.classList.contains('dict-word'))) {
                    Array.from(node.childNodes).forEach(process);
                }
            }
            Array.from(temp.childNodes).forEach(process);
            return temp.innerHTML;
        }

        function renderCard() {
            isEnglishVisible = false;
            tooltip.style.display = 'none';
            
            const sentenceId = activeQueue[currentIndex];
            const data = currentDeckData[sentenceId][`level${currentLeague}`];
            
            elBadge.innerText = `League ${currentLeague}`;
            elProgress.innerText = `Card ${currentIndex + 1} of ${activeQueue.length}`;
            
            elTurkish.innerHTML = wrapWords(data.tr);
            elEnglish.innerHTML = data.en;
            
            elEnglish.style.display = 'none';
            elDivider.style.display = 'none';
            containerShowBtn.style.display = 'flex';
            containerAssessBtns.style.display = 'none';
        }

        function showEnglish() {
            isEnglishVisible = true;
            elEnglish.style.display = 'block';
            elDivider.style.display = 'block';
            containerShowBtn.style.display = 'none';
            containerAssessBtns.style.display = 'flex';
            tooltip.style.display = 'none';
        }

        function recordAnswer(isCorrect) {
            if (isCorrect) {
                correctCount++;
            } else {
                wrongCount++;
                wrongQueue.push(activeQueue[currentIndex]); 
            }
            currentIndex++;
            if (currentIndex >= activeQueue.length) {
                renderSummary();
            } else {
                renderCard();
            }
        }

        function undoAction() {
            if (currentIndex === 0 && uiSummary.style.display === 'none') return;
            if (uiSummary.style.display !== 'none') {
                uiSummary.style.display = 'none';
                uiFlashcard.style.display = 'flex';
            }
            currentIndex--;
            const undoneSentenceId = activeQueue[currentIndex];

            if (wrongQueue.length > 0 && wrongQueue[wrongQueue.length - 1] === undoneSentenceId) {
                wrongQueue.pop(); 
                wrongCount--;
            } else {
                correctCount--;
            }
            renderCard();
        }

        function renderSummary() {
            uiFlashcard.style.display = 'none';
            uiSummary.style.display = 'block';
            tooltip.style.display = 'none';
            
            document.getElementById('summary-title').innerText = `League ${currentLeague} Complete!`;
            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-wrong').innerText = wrongCount;
            
            const total = correctCount + wrongCount;
            const percent = Math.round((correctCount / total) * 100);
            document.getElementById('stat-percent').innerText = `${percent}%`;

            const controlsDiv = document.getElementById('summary-controls');
            controlsDiv.innerHTML = ''; 

            if (wrongCount > 0) {
                const btnReview = document.createElement('button');
                btnReview.className = 'btn-review';
                btnReview.innerText = `Review ${wrongCount} Mistakes`;
                btnReview.onclick = startReview;
                controlsDiv.appendChild(btnReview);
            }

            if (currentLeague < 3) {
                const btnAdvance = document.createElement('button');
                btnAdvance.className = 'btn-advance';
                btnAdvance.innerText = `Advance to League ${currentLeague + 1} (↓)`;
                btnAdvance.onclick = () => startLeague(currentLeague + 1);
                controlsDiv.appendChild(btnAdvance);
            } else if (currentLeague === 3 && wrongCount === 0) {
                const btnFinish = document.createElement('button');
                btnFinish.className = 'btn-advance';
                btnFinish.innerText = `🏆 Mastered Everything! Restart League 1`;
                btnFinish.onclick = () => startLeague(1);
                controlsDiv.appendChild(btnFinish);
            }
        }

        // Dictionary Tooltip Logic
        function setupTooltip() {
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('dict-word')) {
                    const rawWord = e.target.innerText.toLowerCase().replace(/[^a-zğüşıöç]/g, '');
                    const currentVocab = currentDeckData[activeQueue[currentIndex]].vocab;
                    
                    if (currentVocab && currentVocab[rawWord]) {
                        tooltip.innerText = currentVocab[rawWord];
                        tooltip.style.display = 'block';
                        
                        const rect = e.target.getBoundingClientRect();
                        tooltip.style.top = (rect.top + window.scrollY - 35) + 'px';
                        tooltip.style.left = (rect.left + window.scrollX + (rect.width / 2)) + 'px';
                    } else {
                        tooltip.style.display = 'none';
                    }
                } else {
                    tooltip.style.display = 'none';
                }
            });
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', function(event) {
                if (uiFlashcard.style.display !== 'none') {
                    if (event.key === 'ArrowUp' && !isEnglishVisible) {
                        event.preventDefault(); 
                        showEnglish();
                    } else if (event.key === 'ArrowRight' && isEnglishVisible) {
                        event.preventDefault();
                        recordAnswer(true);
                    } else if (event.key === 'ArrowLeft' && isEnglishVisible) {
                        event.preventDefault();
                        recordAnswer(false);
                    } else if (event.key === 'ArrowDown') {
                        event.preventDefault();
                        undoAction(); 
                    }
                } 
                else if (uiSummary.style.display !== 'none') {
                    if (event.key === 'ArrowDown') {
                        event.preventDefault();
                        undoAction(); 
                    }
                }
            });
        }

        window.onload = initApp;

    </script>

    <script>

                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registered successfully with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('Service Worker registration failed: ', err);
                    });
            });
        }
    </script>
